<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" width="540" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;display=swap');
      .logo-text {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        font-size: 36px;
        letter-spacing: 0.08em;
      }
      .hexagon {
        fill: none;
        stroke: #5EEAD4;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0B0E14" />
  
  <!-- Content Group -->
  <g transform="translate(10, 0)">
    <!-- Hexagon Outline (Pointy top, slightly rounded corners, left side) -->
    <!-- CX = 80, CY = 80, R = 28 -->
    <polygon class="hexagon" points="80,52 104.25,66 104.25,94 80,108 55.75,94 55.75,66" />
    
    <!-- Typographic Logo Lockup -->
    <!-- Centered baseline at Y = 91 for perfect alignment with Y = 80 visual center -->
    <text x="135" y="91" class="logo-text">
      <tspan fill="#5EEAD4" font-weight="700">HEX</tspan><tspan fill="#8FA3AE" font-weight="500">FRAME</tspan>
    </text>
  </g>
</svg>
